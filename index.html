<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poonno — A Night-Train Story</title>
  <meta name="description" content="Sheikh Abdullah Bin Alam (Poonno) — athlete, creative director, and commercial leader, told as a scroll-driven night-train journey." />

  <!-- Fonts: Fraunces (headings), Inter (UI/body), Sacramento (script fallback) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=Sacramento&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />

  <!-- Three.js 0.160.0 (pinned) + addons, via importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Real heading + copy for accessibility / SEO (visually hidden) -->
  <h1 class="visually-hidden">Poonno — a night-train journey through three windows: athlete, creative director, and commercial leader.</h1>

  <!-- WebGL render surface -->
  <canvas id="scene"></canvas>

  <!-- Atmosphere overlays (film grain + vignette) -->
  <div id="grain" aria-hidden="true"></div>
  <div id="vignette" aria-hidden="true"></div>

  <!-- Nav bar (revealed after Enter) -->
  <nav id="nav" class="nav-hidden" aria-label="Primary">
    <a id="nav-logo" href="#top" aria-label="Poonno — back to top">
      <span class="sig-mask" role="img" aria-label="Poonno"></span>
    </a>
    <button id="whistle-rope" type="button" aria-label="Pull the whistle rope">
      <span class="rope-line"></span>
      <span class="rope-handle"></span>
    </button>
    <div id="nav-links">
      <a id="cv-link" href="assets/cv/Sheikh_Abdullah_CV_2026.pdf" download>Download CV</a>
      <button class="nav-jump" type="button" data-t="0.40">Creative Origins</button>
      <button class="nav-jump" type="button" data-t="0.66">Unilever Station</button>
      <button class="nav-jump" type="button" data-t="1.0">Horizons Crossing</button>
      <button id="mute-btn" type="button" aria-label="Mute sound" aria-pressed="false">
        <span class="mute-ico">♪</span>
      </button>
    </div>
  </nav>

  <!-- Beat / progress readout (debug aid — hidden by default, toggle with 'h') -->
  <div id="hud" class="hud-hidden" aria-hidden="true">
    <div id="hud-beat">Platform arrival</div>
    <div id="hud-meta"><span id="hud-t">t 0.000</span><span id="hud-hold"></span></div>
  </div>

  <!-- Scroll hint on the platform (shown after Enter) -->
  <div id="scroll-hint" aria-hidden="true">scroll to travel ↓</div>

  <!-- Cab click-guidance (Phase 4) -->
  <div id="cab-hint" class="cab-hint" aria-hidden="true">Two things in here know Poonno best — give them a tap.</div>
  <div id="tip-shelf" class="tap-tip" aria-hidden="true">Tap to explore</div>
  <div id="tip-poster" class="tap-tip" aria-hidden="true">Tap to explore</div>

  <!-- Modal root (Phase 4) -->
  <div id="modal-root" class="modal-root" aria-hidden="true"></div>

  <!-- Loader + Enter gate (covers the scene until first tap) -->
  <div id="loader">
    <div id="loader-inner">
      <div id="loader-sig" aria-hidden="true"></div>
      <button id="enter-btn" class="enter-hidden" type="button">tap to begin <span class="note">♪</span></button>
    </div>
  </div>

  <!-- Tall spacer: scrolling through it drives progress t (0 → 1) -->
  <div id="scroll-spacer"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
